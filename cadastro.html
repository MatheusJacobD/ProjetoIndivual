<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style/style.css" />
</head>

<body>
    <nav class="navBar" id="head">
        <div class="navLogo">
            <a href="index.html"><img src="img/chessLogo.png" alt="Logo" class="navLogoImagem" /></a>
            <span class="navLogoTexto">
                Jacob's <span class="Destaque">Chess</span>
            </span>
        </div>

        <div class="navLinks">
            <a href="dash.html">DASHBOARD</a>
            <a href="teste.html">QUESTIONÁRIO</a>
            <a href="login.html">LOGIN</a>
            <a href="cadastro.html">CADASTRO</a>
        </div>
    </nav>

    <div class="insertContainer">
        <div class="painel">
            <div class="insertHeader">
                <img src="img/chessLogo.png" class="insertLogo">
                <span class="insertTitle">Cadastre-se</span>
            </div>

            <div class="inputSection">
                <span class="inputTitle">
                    email <span id="erro_email"></span>
                </span><br>
                <input placeholder="exemplo.exemplo@sptech.school" id="ipt_email">
            </div>

            <div class="inputSection">
                <span class="inputTitle">username<span id="erro_nome"></span></span><br>
                <input placeholder="nomeradical" id="ipt_nome">
            </div>

            <div class="inputSection">
                <span class="inputTitle">senha<span id="erro_senha"></span></span><br>
                <input type="password" placeholder="exemplo.exemplo@sptech.school" id="ipt_senha">
            </div>

            <div class="inputSection">
                <span class="inputTitle">confirme sua senha <span id="erro_senhaC"></span></span><br>
                <input type="password" placeholder="exemplo.exemplo@sptech.school" id="ipt_confirmar">
            </div>

            <div class="botaoFinalizarContainer">
                <a class="botaoFinalizar" onclick="validar()">FINALIZAR</a>
            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>

</html>
