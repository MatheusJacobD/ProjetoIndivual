<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navBar">
        <div class="navLogo">
            <img src="img/chessLogo.png" alt="Logo" class="navLogoImagem" />
            <span class="navLogoTexto">
                Jacob's <span class="navLogoDestaque">Chess</span>
            </span>
        </div>

        <div class="navLinks">
            <a href="#">DASHBOARD</a>
            <a href="#">QUESTIONÁRIO</a>
            <a href="#">LOGIN</a>
            <a href="#">CADASTRO</a>
        </div>
    </nav>

    <section class="secaoHero">
        <div class="heroTexto">
            <h1>
                O <span>tabuleiro</span> muda menos do<br>
                que quem aprende a olhar<br>
                para ele
            </h1>
        </div>

        <div class="heroTabuleiro" id="tabuleiroHero"></div>
    </section>

    <div class="divDetalhe">
        <img src="img/detalhe.png">
    </div>

    <div class="divIcon">
        <img src="img/icon.png">
        <img src="img/rec.png">
        <span class="iconTexto">
            <span class="Destaque">Xadrez</span> é um jogo de <span class="Destaque">estratégia</span><br> baseado em
            decisões, antecipação e <br><span class="Destaque">análise</span>, onde cada movimento tem<br> uma
            consequência direta.
        </span>
    </div>

    <script src="tabuleiro.js"></script>

</html>
