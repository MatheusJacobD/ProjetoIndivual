<body>
    <nav class="navBar" id="head">
        <div class="navLogo">
            <a href="index.html"><img src="img/chessLogo.png" alt="Logo" class="navLogoImagem" /></a>

                Jacob's <span class="Destaque">Chess</span>

            <div class="progress">

                    <div class="questImg">
                        <div class="questBack">
                            <img src="img/peao.png">
                        </div>
                    </div>

                    <div class="questQuestion">
                        <span class="quest">Quando aparece um problema inesperado, você geralmente</span>
                    </div>
                </div>
            </div>

            <div class="questColumn">
                <div class="questRow">

                    <div class="questQuestions">
                        <div class="questNumber">
                            <span class="questNumberText">1</span>
                        </div>
                        <div class="questText">
                            <span class="questTextQuestion">Resolve na hora, mesmo sem pensar muito</span>
                        </div>
                    </div>

                    <div class="questQuestions">
                        <div class="questNumber">
                            <span class="questNumberText">2</span>
                        </div>
                        <div class="questText">
                            <span class="questTextQuestion">Para e analisa as opções</span>
                        </div>
                    </div>

                </div>

                <div class="questRow">

                    <div class="questQuestions">
                        <div class="questNumber">
                            <span class="questNumberText">3</span>
                        </div>
                        <div class="questText">
                            <span class="questTextQuestion">Espera entender melhor antes de agir</span>
                        </div>
                    </div>

                    <div class="questQuestions">
                        <div class="questNumber">
                            <span class="questNumberText">4</span>
                        </div>
                        <div class="questText">
                            <span class="questTextQuestion">Para e analisa as opções</span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="questFinal">
                <div class="questFinalContainer">
                    <span class="questFinalText">🠖</span>
                </div>
            </div>

        </div>
    </div>

    <script src="js/quest.js"></script>
