<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css" />
    <link rel="icon" type="image/x-icon" href="img/chessLogo.png">
</head>

<body>
    <nav class="navBar" id="head">
        <div class="navLogo">
            <a href="index.html"><img src="img/chessLogo.png" alt="Logo" class="navLogoImagem" /></a>
            <span class="navLogoTexto">
                Jacob's <span class="Destaque">Chess</span>
            </span>
        </div>

        <div class="navLinks">
            <a href="dash.html">DASHBOARD</a>
            <a href="teste.html">QUESTIONÁRIO</a>
            <a href="login.html">LOGIN</a>
            <a href="cadastro.html">CADASTRO</a>
        </div>
    </nav>

    <div class="resultadoContainer">

        <div class="resultadoPainel">

            <div class="resultadoHeader">

                <img src="img/chessLogo.png" class="resultadoPeao">

                <span class="resultadoTitulo">
                    Resultado
                </span>

            </div>

            <div class="resultadoGM">

                <span class="resultadoSubtitulo">
                    Seu estilo de jogo é parecido com
                </span>

                <div class="resultadoGMInfo">

                    <img id="resultadoGMImagem">

                    <div class="resultadoGMTexto">

                        <span class="resultadoGMNome" id="resultadoGMNome">
                        </span>

                        <span class="resultadoDescricao" id="resultadoGMDesc">
                        </span>

                    </div>

                </div>

            </div>

            <div class="resultadoEstilo" id="resultadoFundo">

                <span class="resultadoEstiloTexto" id="resultadoEstiloNome">
                </span>

                <img class="resultadoFogo" id="resultadoEstiloIcon">

            </div>

            <div class="resultadoDescricaoEstilo" id="resultadoEstiloDesc">
            </div>

            <div class="resultadoAbertura">

                <img class="resultadoDamaEsquerda" id="resultadoPeca">

                <div class="resultadoAberturaTexto">

                    <span class="resultadoAberturaTitulo" id="resultadoAberturaNome">
                    </span>

                    <span class="resultadoDescricao2" id="resultadoAberturaDesc">
                    </span>

                </div>

                <img src="img/dama.png" class="resultadoDamaDireita" id="resultadoPeca2">

            </div>

            <div class="resultadoFooter">

                <span class="resultadoFooterTexto">
                    Acesse a DashBoard para comparar seus resultados!
                </span>

                <a href="dash.html" class="resultadoBotao">
                    dashboard
                </a>

            </div>

        </div>

    </div>

    <script src="js/result.js"></script>
</body>

</html>
