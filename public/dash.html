<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="navBar" id="head">
        <div class="navLogo">
            <a href="index.html"><img src="img/chessLogo.png" alt="Logo" class="navLogoImagem" /></a>
            <span class="navLogoTexto">
                Jacob's <span class="Destaque">Chess</span>
            </span>
        </div>

        <div class="navLinks">
            <a href="dash.html">DASHBOARD</a>
            <a href="teste.html">QUESTIONÁRIO</a>
            <a href="login.html">LOGIN</a>
            <a href="cadastro.html">CADASTRO</a>
        </div>
    </nav>

    <div class="dashContainer">
        <div class="painelDash">
            <div class="dashHeader">
                <img src="img/dashIcon.png" class="dashLogo">
                <span class="dashTitle">DashBoard</span>
            </div>

            <div class="kpis">
                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitle">Total de Usuários</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBody" id="total">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitle">% de Questionários Respondidos</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBody" id="porcenQuest">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitleAG">Estilo Agressivo</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBody" id="qtdAg">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitleFC">Estilo Fechado</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBody" id="qtdFc">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitleES">Estilo Estrategico</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBody" id="qtdEs">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitle">GM Mais Comum</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBodyGr" id="gmCm">0</div>
                    </div>
                </div>

                <div class="kpi">
                    <div class="TitleContainer">
                        <div class="KPItitle">Abertura Mais Comum</div>
                    </div>
                    <div class="BodyContainer">
                        <div class="KPIBodyGr" id="abCm">0</div>
                    </div>
                </div>
            </div>

            <div class="graficosContainer">
                <div class="areaPizza">
                    <canvas id="graficoPizza"></canvas>
                </div>

                <div class="areaBarra">
                    <canvas id="graficoBarra"></canvas>
                </div>

                <div class="rankContainer">
                    <div class="ranking" id="rank">
                        <div class="rankLinhas" id="rankTitle">
                            RANKING
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
    </div>

    <script src="js/dash.js"></script>
